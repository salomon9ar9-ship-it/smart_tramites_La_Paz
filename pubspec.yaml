name: smarttramites
description: SmartTrámites La Paz - Optimización digital de trámites administrativos
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 🎨 UI & Animaciones
  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.3
  flutter_animate: ^4.5.0

  # 💾 Almacenamiento Persistente Local (opcional - caché)
  shared_preferences: ^2.3.3

  # 🔄 Gestión de Estado
  provider: ^6.1.2

  # 🌐 Comunicación HTTP con Backend
  http: ^1.2.2
  dio: ^5.4.0

  # 🔐 Seguridad & Utilidades
  crypto: ^3.0.6

  # 📸 Cámara e Imágenes
  image_picker: ^1.1.2
  image: ^4.3.0

  # 📄 Generación de PDF
  pdf: ^3.11.1
  printing: ^5.13.3

  # 📱 Códigos QR
  qr_flutter: ^4.1.0

  # 🌍 ID único
  uuid: ^4.5.1

  # 🌍 Enlaces Externos
  url_launcher: ^6.3.1

  # 📅 Formato de Fechas
  intl: ^0.19.0

  # 🖼️ Carga de Imágenes
  cached_network_image: ^3.4.1

  # 📦 Serialización JSON
  json_annotation: ^4.8.1

  # 📂 Manejo de rutas de archivos
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.8
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/